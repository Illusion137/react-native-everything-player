buildscript {
  ext {
    kotlinVersion = "2.1.20"
    minSdkVersion = 24
    targetSdkVersion = 36
    compileSdkVersion = 36
    ndkVersion = "27.1.12297006"
  }

  repositories {
    google()
    mavenCentral()
  }

  dependencies {
    classpath "com.android.tools.build:gradle:9.1.0"
    classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion"
  }
}

allprojects {
  repositories {
    google()
    mavenCentral()
  }
}
